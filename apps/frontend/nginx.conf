# SPA serving inside the frontend container. The edge Nginx (config/nginx)
# terminates TLS and proxies /api + /ws to the API services; this server only
# serves the built static assets with history-API fallback.
server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Long-cache hashed assets.
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }

  # SPA fallback — every unknown path returns index.html.
  location / {
    try_files $uri $uri/ /index.html;
  }
}
