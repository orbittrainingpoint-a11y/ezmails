# SPA serving inside the frontend container. The edge Apache terminates TLS and
# proxies /api + /webmail-api + /ws to the API services; this server serves the
# built static assets with history-API fallback and sets security headers.
server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # ── Security headers (applied to document responses) ──
  # HSTS: force HTTPS for a year (the public connection is always TLS via Apache).
  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=(), usb=(), interest-cohort=()" always;
  add_header Cross-Origin-Opener-Policy "same-origin" always;
  # CSP: scripts only from our origin (kills injected/inline script XSS). Styles allow
  # 'unsafe-inline' (Tailwind/inline styles) + Google Fonts; images allow data:/blob:
  # for QR codes and attachment previews. Email bodies render in a sandboxed iframe.
  add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: blob:; connect-src 'self'; frame-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'self'" always;

  # Long-cache hashed assets (immutable build output; no CSP needed on JS/CSS itself).
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }

  # SPA fallback — every unknown path returns index.html.
  location / {
    try_files $uri $uri/ /index.html;
  }
}
