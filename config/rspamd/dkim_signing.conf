# DKIM signing for outbound mail. Private keys are written by the admin API to
# /var/lib/rspamd/dkim/<domain>.<selector>.key (shared docker volume dkim-keys).
enabled = true;
sign_local = true;
sign_authenticated = true;
use_domain = "envelope";
allow_username_mismatch = true;
try_fallback = true;

# Selector + key path. The active selector per domain is maintained in
# selectors.map (one "domain selector" pair per line) by the admin API; the key
# file follows the <domain>.<selector>.key naming the API writes.
path = "/var/lib/rspamd/dkim/$domain.$selector.key";
selector = "ezmails";
selector_map = "/var/lib/rspamd/dkim/selectors.map";
