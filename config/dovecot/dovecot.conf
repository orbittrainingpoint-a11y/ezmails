# ezmails Dovecot — __MAIL_HOSTNAME__ substituted at runtime.
protocols = imap pop3 lmtp sieve
listen = *

mail_location = maildir:/var/mail/vhosts/%d/%n
mail_uid = 5000
mail_gid = 5000
first_valid_uid = 5000
last_valid_uid = 5000
mail_privileged_group = vmail

# ── TLS ──
ssl = required
ssl_cert = </etc/letsencrypt/live/__MAIL_HOSTNAME__/fullchain.pem
ssl_key = </etc/letsencrypt/live/__MAIL_HOSTNAME__/privkey.pem
ssl_min_protocol = TLSv1.2
ssl_prefer_server_ciphers = yes

# ── Authentication (SQL) ──
disable_plaintext_auth = yes
auth_mechanisms = plain login
passdb {
  driver = sql
  args = /etc/dovecot/dovecot-sql.conf.ext
}
userdb {
  driver = sql
  args = /etc/dovecot/dovecot-sql.conf.ext
}

# ── Services ──
service lmtp {
  # Postfix delivers here (virtual_transport = lmtp:inet:dovecot:24).
  inet_listener lmtp {
    address = 0.0.0.0
    port = 24
  }
}

service auth {
  # SASL auth socket Postfix uses for submission.
  inet_listener {
    port = 12345
  }
}

service imap-login {
  inet_listener imaps {
    port = 993
    ssl = yes
  }
}
service pop3-login {
  inet_listener pop3s {
    port = 995
    ssl = yes
  }
}
service managesieve-login {
  inet_listener sieve {
    port = 4190
  }
}

# ── Quota + Sieve ──
mail_plugins = $mail_plugins quota
plugin {
  quota = maildir:User quota
  sieve = file:/var/mail/vhosts/%d/%n/sieve;active=/var/mail/vhosts/%d/%n/.dovecot.sieve
}

protocol lmtp {
  mail_plugins = $mail_plugins sieve
}
protocol imap {
  mail_plugins = $mail_plugins imap_quota
}

log_path = /dev/stderr
info_log_path = /dev/stdout
