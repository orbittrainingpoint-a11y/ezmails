# ezmails — host Apache reverse proxy for a single domain.
#   __DOMAIN__ is substituted by the installer.
#
# Layout on this one host:
#   https://__DOMAIN__/                 → webmail  (the common URL for email users)
#   https://__DOMAIN__/<secret-path>/   → admin control panel (same SPA, secret base path)
#   /api/ , /ws                         → admin-api   (127.0.0.1:13001)
#   /webmail-api/                       → webmail-api (127.0.0.1:13002)
#   everything else                     → frontend static SPA (127.0.0.1:8080)
#
# This file is the plain HTTP (:80) vhost. Run `certbot --apache` (the installer
# does this) to add the matching HTTPS (:443) vhost + the HTTP→HTTPS redirect.
#
# Required modules:  proxy proxy_http proxy_wstunnel ssl headers rewrite

<VirtualHost *:80>
  ServerName __DOMAIN__

  ProxyPreserveHost On
  ProxyRequests Off
  ProxyTimeout 120

  # Forward the real scheme so the apps build correct cookies/links behind TLS.
  RequestHeader set X-Forwarded-Proto "https"

  # ── Admin realtime dashboard (WebSocket) — must come before /api and / ──
  ProxyPass        /ws  ws://127.0.0.1:13001/ws  retry=0
  ProxyPassReverse /ws  ws://127.0.0.1:13001/ws

  # ── Admin control-panel API ──
  ProxyPass        /api/  http://127.0.0.1:13001/api/  retry=0
  ProxyPassReverse /api/  http://127.0.0.1:13001/api/

  # ── Webmail API ──
  ProxyPass        /webmail-api/  http://127.0.0.1:13002/webmail-api/  retry=0
  ProxyPassReverse /webmail-api/  http://127.0.0.1:13002/webmail-api/

  # ── SPA: webmail at "/", admin panel at the secret base path ──
  ProxyPass        /  http://127.0.0.1:8080/  retry=0
  ProxyPassReverse /  http://127.0.0.1:8080/

  # Allow large attachments (matches the app's 30 MB limit).
  LimitRequestBody 31457280

  Header always set X-Content-Type-Options "nosniff"
  Header always set X-Frame-Options "SAMEORIGIN"

  ErrorLog  ${APACHE_LOG_DIR}/ezmails-error.log
  CustomLog ${APACHE_LOG_DIR}/ezmails-access.log combined
</VirtualHost>
