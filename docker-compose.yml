# ezmails — service orchestration
# Single SQL database (PostgreSQL) + Redis. No cloud dependencies.
name: ezmails

# The edge reverse proxy + TLS is the HOST's Apache (not a container). These
# services publish only on 127.0.0.1 so Apache (mod_proxy) can reach them while
# they stay private to the public internet. See config/apache/ezmails.conf.
services:
  admin-api:
    build:
      context: .
      dockerfile: apps/admin-api/Dockerfile
      network: host
    env_file: .env
    ports:
      # Host port 13001 (3001 is used by another app on this VPS) → container 3001.
      - "127.0.0.1:13001:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - dkim-keys:/var/lib/rspamd/dkim
    restart: unless-stopped

  webmail-api:
    build:
      context: .
      dockerfile: apps/webmail-api/Dockerfile
      network: host
    env_file: .env
    ports:
      # Host port 13002 (3002 is used by another app on this VPS) → container 3002.
      - "127.0.0.1:13002:3002"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./apps/frontend
      network: host
      args:
        # Secret admin base path baked into the SPA at build time.
        VITE_ADMIN_BASE: ${ADMIN_BASE_PATH}
    ports:
      - "127.0.0.1:8080:80"
    restart: unless-stopped

  # Mail stack (postfix/dovecot/rspamd/clamav) is opt-in via the "mail" profile.
  # On a host that already runs a mail server, leave it off (ports 25/465/587/993/995
  # would clash); webmail runs in DB-backed mode instead. Start with:
  #   docker compose --profile mail up -d
  postfix:
    profiles: ["mail"]
    build:
      context: ./config/postfix
      network: host
    env_file: .env
    ports:
      - "25:25"
      - "465:465"
      - "587:587"
    volumes:
      - mailboxes:/var/mail/vhosts
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  dovecot:
    profiles: ["mail"]
    build:
      context: ./config/dovecot
      network: host
    env_file: .env
    ports:
      - "993:993"
      - "995:995"
      - "4190:4190"
    volumes:
      - mailboxes:/var/mail/vhosts
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  rspamd:
    profiles: ["mail"]
    image: rspamd/rspamd:latest
    volumes:
      - ./config/rspamd:/etc/rspamd/local.d:ro
      - dkim-keys:/var/lib/rspamd/dkim
      - rspamd-data:/var/lib/rspamd
    depends_on:
      - redis
    restart: unless-stopped

  clamav:
    profiles: ["mail"]
    image: clamav/clamav:latest
    volumes:
      - clamav-data:/var/lib/clamav
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./scripts/postgres-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres-data:
  redis-data:
  rspamd-data:
  clamav-data:
  mailboxes:
  dkim-keys:
